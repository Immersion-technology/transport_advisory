<!doctype html>
<html lang="en-NG">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#0A3828" />
    <meta name="theme-color" content="#0A3828" />

    <!-- Primary Meta -->
    <title>Transport Advisory — Vehicle Compliance Platform for Nigeria</title>
    <meta name="description" content="Nigeria's vehicle compliance platform. Track Motor Insurance, Vehicle License, and Roadworthiness Certificate expiry dates in one place. Receive SMS and email reminders and renew documents online without office visits." />
    <meta name="keywords" content="vehicle compliance nigeria, motor insurance reminder, vehicle license renewal, roadworthiness certificate, niid verification, hackney permit, lagos car papers, verify plate number nigeria" />
    <meta name="author" content="Transport Advisory" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://transportadvisory.ng/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Transport Advisory — Vehicle Compliance Platform" />
    <meta property="og:description" content="Track vehicle documents, receive reminders before expiry, and renew online without office visits." />
    <meta property="og:url" content="https://transportadvisory.ng/" />
    <meta property="og:image" content="https://transportadvisory.ng/apple-touch-icon.svg" />
    <meta property="og:site_name" content="Transport Advisory" />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Transport Advisory — Vehicle Compliance Platform" />
    <meta name="twitter:description" content="Track vehicle documents, receive reminders before expiry, and renew online." />
    <meta name="twitter:image" content="https://transportadvisory.ng/apple-touch-icon.svg" />

    <!-- Performance: preconnect to font host + preload main font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Transport Advisory",
      "url": "https://transportadvisory.ng",
      "logo": "https://transportadvisory.ng/apple-touch-icon.svg",
      "description": "Nigeria's vehicle compliance platform — automated tracking, reminders, and renewal facilitation for vehicle documents.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Lagos",
        "addressCountry": "NG"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Nigeria"
      },
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
